# Prometheus Monitoring Configuration
# BadmintonGroup MVP

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    project: badmintongroup
    environment: production

# Alerting rules
rule_files:
  - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Backend API metrics
  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:3001']
        labels:
          service: 'api'
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'badminton-backend'

  # Node exporter (if installed on host)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system'
    scrape_interval: 30s

  # PostgreSQL metrics (if pg_exporter installed)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'database'
    scrape_interval: 30s

  # Redis metrics (if redis_exporter installed)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'cache'
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'monitoring'

# Alerting rules (basic)
# Uncomment and configure with Alertmanager in production
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']
